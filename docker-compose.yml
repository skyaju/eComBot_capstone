services:

  # ─── eComBot Application ──────────────────────────────────────────────────
  ecombot:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: ecombot:latest
    container_name: ecombot
    restart: unless-stopped
    ports:
      - "${ECOMBOT_PORT:-8080}:8080"
    environment:
      # ── LLM / OpenRouter ────────────────────────────────────────────────
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY}"
      OPENROUTER_API_BASE: "${OPENROUTER_API_BASE:-https://openrouter.ai/api/v1}"
      MODEL_NAME: "${MODEL_NAME:-openrouter/google/gemini-2.5-flash}"
      MODEL_TEMPERATURE: "${MODEL_TEMPERATURE:-0.3}"
      MAX_OUTPUT_TOKENS: "${MAX_OUTPUT_TOKENS:-1024}"
      # ── Agent ────────────────────────────────────────────────────────────
      AGENT_NAME: "${AGENT_NAME:-eComBot}"
      AGENT_PERSONA: "${AGENT_PERSONA:-friendly}"
      TOOLS_ENABLED: "${TOOLS_ENABLED:-true}"
      MULTI_AGENT_MODE: "${MULTI_AGENT_MODE:-false}"
      # ── Session / Memory ─────────────────────────────────────────────────
      SESSION_ID_PREFIX: "${SESSION_ID_PREFIX:-ecombot-session}"
      APP_NAME: "${APP_NAME:-ecombot_app}"
      USER_ID: "${USER_ID:-default_user}"
      SESSION_TTL_SECONDS: "${SESSION_TTL_SECONDS:-86400}"
      # ── Redis ────────────────────────────────────────────────────────────
      REDIS_URL: "redis://redis:6379/0"
      # ── PostgreSQL ───────────────────────────────────────────────────────
      DATABASE_URL: "postgresql://ecombot:${POSTGRES_PASSWORD:-ecombot_secret}@postgres:5432/ecombot"
      # ── ChromaDB ─────────────────────────────────────────────────────────
      CHROMA_HOST: "chromadb"
      CHROMA_PORT: "8000"
      CHROMA_COLLECTION: "${CHROMA_COLLECTION:-ecombot_knowledge}"
      SKIP_KNOWLEDGE_INGESTION: "${SKIP_KNOWLEDGE_INGESTION:-true}"
      # ── Knowledge / Data ─────────────────────────────────────────────────
      MOCK_DATA_DIR: "src/data"
      KNOWLEDGE_BASE_DIR: "data/knowledge"
      # ── Logging ──────────────────────────────────────────────────────────
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      HOME: "/home/ecombot"
      XDG_CACHE_HOME: "/home/ecombot/.cache"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    volumes:
      - adk_sessions:/app/src/.adk
    networks:
      - ecombot_net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ─── Chainlit UI Frontend (reuses orchestrator + agents) ───────────────────
  chainlit:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: ecombot:latest
    container_name: ecombot_chainlit
    restart: unless-stopped
    user: root
    working_dir: /tmp/chainlit
    entrypoint: ["chainlit", "run", "/app/src/ui/chainlit_app.py", "--host", "0.0.0.0", "--port", "8001"]
    ports:
      - "${CHAINLIT_PORT:-8001}:8001"
    environment:
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY}"
      OPENROUTER_API_BASE: "${OPENROUTER_API_BASE:-https://openrouter.ai/api/v1}"
      MODEL_NAME: "${MODEL_NAME:-openrouter/google/gemini-2.5-flash}"
      MODEL_TEMPERATURE: "${MODEL_TEMPERATURE:-0.3}"
      MAX_OUTPUT_TOKENS: "${MAX_OUTPUT_TOKENS:-1024}"
      AGENT_NAME: "${AGENT_NAME:-eComBot}"
      AGENT_PERSONA: "${AGENT_PERSONA:-friendly}"
      TOOLS_ENABLED: "${TOOLS_ENABLED:-true}"
      MULTI_AGENT_MODE: "${MULTI_AGENT_MODE:-false}"
      SESSION_ID_PREFIX: "${SESSION_ID_PREFIX:-ecombot-session}"
      APP_NAME: "${APP_NAME:-ecombot_app}"
      USER_ID: "${USER_ID:-default_user}"
      SESSION_TTL_SECONDS: "${SESSION_TTL_SECONDS:-86400}"
      REDIS_URL: "redis://redis:6379/0"
      DATABASE_URL: "postgresql://ecombot:${POSTGRES_PASSWORD:-ecombot_secret}@postgres:5432/ecombot"
      CHROMA_HOST: "chromadb"
      CHROMA_PORT: "8000"
      CHROMA_COLLECTION: "${CHROMA_COLLECTION:-ecombot_knowledge}"
      SKIP_KNOWLEDGE_INGESTION: "${SKIP_KNOWLEDGE_INGESTION:-true}"
      MOCK_DATA_DIR: "src/data"
      KNOWLEDGE_BASE_DIR: "data/knowledge"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      HOME: "/home/ecombot"
      XDG_CACHE_HOME: "/home/ecombot/.cache"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    networks:
      - ecombot_net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── Redis — Session Memory ───────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: ecombot_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - ecombot_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── PostgreSQL — Analytics / Audit / Customer Profiles ──────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ecombot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecombot
      POSTGRES_USER: ecombot
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-ecombot_secret}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ecombot_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecombot -d ecombot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── ChromaDB — Vector Store (RAG) ───────────────────────────────────────
  chromadb:
    image: chromadb/chroma:0.5.23
    container_name: ecombot_chromadb
    restart: unless-stopped
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/data
      ANONYMIZED_TELEMETRY: "False"
    ports:
      - "${CHROMA_PORT:-8000}:8000"
    volumes:
      - chroma_data:/chroma/data
    networks:
      - ecombot_net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/v1/heartbeat"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

# ─── Named Volumes ────────────────────────────────────────────────────────────
volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local
  chroma_data:
    driver: local
  adk_sessions:
    driver: local

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  ecombot_net:
    driver: bridge
    name: ecombot_network

